name: Django CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "python-requirements/ubuntu-requirements.txt"
      # システム依存関係のインストール（Linuxのlibmagic）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1
      # 依存関係のインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python-requirements/ubuntu-requirements.txt
          pip install flake8 pylint
      # Linterの実行
      - name: Lint with flake8
        working-directory: ./ApiServer/analysisapp
        run: |
          # Pythonの構文エラーと未定義名をチェック
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # 複雑度やその他のスタイルチェック（警告のみ）
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      # テストとカバレッジの実行
      - name: Run tests with coverage
        working-directory: ./ApiServer/analysisapp
        run: |
          coverage run --source='api' manage.py test api.tests
          coverage report -m
          coverage xml
      # カバレッジレポートのアップロード
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./ApiServer/analysisapp/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
