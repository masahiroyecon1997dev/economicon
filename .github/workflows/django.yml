name: Django CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "ForWindows/requirements.txt"
      # システム依存関係のインストール（Linuxのlibmagic）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1
      # 依存関係のインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # python-magic-binを除外してインストール
          grep -v "python-magic-bin" ForWindows/requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
          # Linux用のpython-magicをインストール
          pip install python-magic
      # テストの実行
      - name: Run tests
        working-directory: ./ApiServer/analysisapp
        run: |
          python manage.py test api.tests
