name: Django CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # uvのインストール
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "ForWindows/requirements.txt"
      # 依存関係のインストール
      - name: Install dependencies
        run: |
          uv pip install -r ForWindows/requirements.txt
      # テストの実行
      - name: Run tests
        working-directory: ./ApiServer/analysisapp
        run: |
          uv run python manage.py test api.tests
