name: "Security Scan"

on:
  # 1. 1週間に1回（月曜日の午前0時）に実行（現状はなし）
  # schedule:
  #   - cron: "0 0 * * 1"
  # 手動での実行を可能にする
  workflow_dispatch:

jobs:
  analyze:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Python (uv) の設定 ---
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Python Dependency Check (pip-audit)
        run: |
          cd api
          uv venv
          uv pip install pip-audit
          uv run pip-audit

      # --- React (pnpm) の設定 ---
      - name: Install pnpm
        uses: pnpm/action-setup@v4 # v4でバージョン指定の柔軟性が向上
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          # cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"

      - name: React Dependency Check (pnpm audit)
        run: |
          cd app
          # pnpm 10系の audit コマンドを実行
          pnpm audit --audit-level high
