name: React CI

on:
  workflow_dispatch:
  push:
    branches: ["dev"]
    paths:
      - "app/**"
  pull_request:
    branches: ["dev"]
    paths:
      - "app/**"

jobs:
  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest-10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: ./app
        run: pnpm test --run

      - name: Run unit tests with coverage
        working-directory: ./app
        run: pnpm test:coverage --run

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./app/coverage/coverage-final.json
          flags: unittests
          name: vitest-coverage
          fail_ci_if_error: false

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "api/uv.lock"

      - name: Setup Python
        run: uv python install

      - name: Install API dependencies
        working-directory: ./api
        run: uv sync

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest-10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"

      - name: Install Frontend dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        working-directory: ./app
        run: pnpm exec playwright install --with-deps ${{ matrix.project }}

      - name: Start FastAPI server
        working-directory: ./api
        run: uv run uvicorn main:app --host 127.0.0.1 --port 8000 &

      - name: Wait for FastAPI to be ready
        run: npx wait-on http://127.0.0.1:8000/docs --timeout 60000

      - name: Run Playwright tests
        working-directory: ./app
        run: pnpm test:e2e --project=${{ matrix.project }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: app/playwright-report/
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest-10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        working-directory: ./app
        run: pnpm lint
