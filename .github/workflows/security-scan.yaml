name: "Security Scan"

on:
  # dev / main ブランチへの PR 時に実行
  pull_request:
    branches: ["dev", "main"]
  # 手動での実行を可能にする
  workflow_dispatch:

jobs:
  python-audit:
    name: Python Dependency Check (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Python Dependency Check (pip-audit)
        run: |
          cd api
          uv sync --group dev
          uv run pip-audit

  react-audit:
    name: React Dependency Check (pnpm audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"

      - name: Install React dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: React Dependency Check (pnpm audit)
        working-directory: ./app
        run: pnpm audit --audit-level high

  rust-audit:
    name: Rust Dependency Check (cargo-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: v1-${{ runner.os }}-cargo-audit

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit
          fi

      - name: Run cargo-audit
        working-directory: ./app/src-tauri
        run: cargo audit

  supply-chain-freshness-check:
    name: Supply Chain Freshness Check (新規パッケージ日齢確認)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # base ブランチの履歴を git show で参照するため全履歴が必要
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # 3.11+ で tomllib が標準搭載。外部依存ゼロで動作する。
          python-version: "3.14"

      - name: Determine base ref and fetch
        id: vars
        run: |
          # PR の場合は github.base_ref、workflow_dispatch の場合は main にフォールバック
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="main"
            echo "workflow_dispatch: base-ref を main にフォールバックします。"
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          git fetch --no-tags origin "$BASE_REF"

      - name: Check package freshness
        run: |
          python packaging/check_new_packages.py \
            --base-ref "origin/${{ steps.vars.outputs.base_ref }}" \
            --days 7 \
            --mode error
