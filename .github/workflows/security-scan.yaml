name: "Security Scan"

on:
  # dev ブランチへの PR 時に実行
  pull_request:
    branches: ["dev"]
  # 手動での実行を可能にする
  workflow_dispatch:

jobs:
  analyze:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Python (uv) の設定 ---
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Python Dependency Check (pip-audit)
        run: |
          cd api
          uv sync --group dev
          uv run pip-audit

      # --- React (pnpm) の設定 ---
      - name: Install pnpm
        uses: pnpm/action-setup@v4 # v4でバージョン指定の柔軟性が向上
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"

      - name: Install React dependencies
        run: |
          cd app
          pnpm install --frozen-lockfile

      - name: React Dependency Check (pnpm audit)
        run: |
          cd app
          pnpm audit --audit-level high

      # --- Rust (Cargo) の設定 ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: v1-${{ runner.os }}-cargo-audit

      - name: Install cargo-audit
        # キャッシュがない場合のみインストール
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit
          fi

      - name: Run cargo-audit
        run: |
          cd app/src-tauri
          cargo audit
