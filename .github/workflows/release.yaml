name: Release Build (Windows Installer)
# Windows NSIS インストーラー（.exe）をビルドして Artifacts に格納する。
# 現在はテスト段階のため workflow_dispatch のみで手動実行。
# 正式リリース時は tag トリガー (tags: ["v*"]) に切り替えること。

on:
  workflow_dispatch:

permissions: {}

jobs:
  build-windows-installer:
    name: Build Windows Installer (NSIS)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest-10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"

      - name: Install frontend dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - name: Install cargo-about
        run: cargo install cargo-about --version 0.8.4 --locked

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "api/uv.lock"

      # -----------------------------------------------------------------------
      # build/build.ps1 STEP 1-9 相当
      # -CI スイッチにより STEP 0（前提ツール確認・対話プロンプト）をスキップして実行
      # -----------------------------------------------------------------------
      - name: Build Windows installer (packaging/build/build.ps1 -CI)
        shell: pwsh
        run: .\packaging\build\build.ps1 -CI

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: economicon-windows-installer
          path: packaging/build/release/*.exe
          retention-days: 14
