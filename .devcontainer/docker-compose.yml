version: '3.9'
services:
  analysis-api-server:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        UID: ${UID:-20000}
        GID: ${GID:-20000}
        DEV_ENV: "development"
    tty: true
    volumes:
      - ../../AnalysisApp:/AnalysisApp
    ports:
      - "127.0.0.1:3000:3000"
      - "8000:8000"
    working_dir: /AnalysisApp/AnalysisApp