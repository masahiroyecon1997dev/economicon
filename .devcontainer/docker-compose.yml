version: "3.9"
services:
  analysis-api-server:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        UID: ${UID:-20000}
        GID: ${GID:-20000}
        DEV_ENV: "development"
    tty: true
    volumes:
      - ../.devcontainer:/AnalysisApp/.devcontainer
      - ../.github:/AnalysisApp/.github
      - ../.vscode:/AnalysisApp/AnalysisApp/.vscode
      - ../ApiServer:/AnalysisApp/analysisappServer
      - ../front-analysis-app:/AnalysisApp/AnalysisApp/front-analysis-app
      - ../SampleData:/AnalysisApp/AnalysisApp/SampleData
      - ../.env:/AnalysisApp/AnalysisApp/.env
      - ../.gitignore:/AnalysisApp/AnalysisApp/.gitignore
      - ../README.md:/AnalysisApp/README.md
    ports:
      - "127.0.0.1:3000:3000"
      - "8000:8000"
    working_dir: /AnalysisApp/AnalysisApp
