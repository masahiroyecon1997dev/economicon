version: '3.9'
services:
  analysis-api-server:
    build:
      context: ./docker
      dockerfile: Dockerfile
      args:
        UID: ${UID:-20000}
        GID: ${GID:-20000}
        DEV_ENV: "development"
    tty: true
    volumes:
      - ../AnalysisApp:/AnalysisApp
    working_dir: /AnalysisApp