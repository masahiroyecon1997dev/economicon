# アプリケーション設定ファイル
# Windows: %APPDATA%\economicon\economicon.config.yml
# macOS/Linux: ~/economicon.config.yml

general:
  # アプリケーションの表示言語 (ja: 日本語, en: 英語)
  language: "ja"
  # 最後に開いたフォルダパス
  last_opened_path: "C:/Users/YourName/Documents"
  # テーマ (light: ライト, dark: ダーク)
  theme: "light"

data:
  # ファイルエンコーディング（日本語データなら "shift_jis" に変更）
  encoding: "utf-8"

log:
  # ログファイルの出力先パス
  path: "./logs/app.log"
