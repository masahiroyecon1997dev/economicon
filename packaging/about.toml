# ==============================================================================
#  about.toml  -  cargo-about 設定ファイル
#  用途: Rust クレートのライセンス情報収集に使用する。
#  参照: https://embarkstudios.github.io/cargo-about/
#
#  使用方法（packaging ディレクトリで実行）:
#    cargo about generate about.hbs > ..\release\licenses\04_RUST_CRATES_LICENSES.txt
# ==============================================================================

# 許可するライセンス識別子（SPDX）
[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "OpenSSL",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "0BSD",
]

# ライセンス不明クレートを警告のみ（エラーにしない）
unlicensed = "warn"

# ライセンスファイルが見つからない場合も警告のみ
[licenses.clarify]
# 例: クレートに明示的なライセンスファイルがない場合は下記で上書き可能
# openssl-sys = { expression = "Apache-2.0", license-files = [] }
